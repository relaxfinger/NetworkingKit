<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Backend API Documentation</title><style>

k;margin-top:18px;color:#c8d6e9;overflow-wrap:anywhere}.server-card .count-badge{margin-top:26px}.feature-list{display:grid;gap:28px;margin-top:34px}.feature-card{margin-top:34px;padding:30px}.feature-heading{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;margin-bottom:30px}.table-wrap{overflow:auto}table{width:100%;min-width:820px;border-collapse:collapse;text-align:left}th{color:var(--muted);font-size:14px;letter-spacing:.07em;text-transform:uppercase}th,td{padding:17px;border-bottom:1px solid var(--line);vertical-align:top}tbody tr:last-child td{border-bottom:0}code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.92em;overflow-wrap:anywhere}.method{display:inline-block;border-radius:7px;padding:6px 8px;background:#24364f;color:#cfe4ff;font:750 12px ui-monospace,SFMono-Regular,Menlo}.method-post{background:#263f32;color:#b6e5c6}.method-delete{background:#482c31;color:#ffc5cb}.empty{margin:40px 0;color:var(--muted);text-align:center}@media(max-width:700px){.hero{padding:58px 0 48px}.lede{font-size:17px}.feature-card{padding:21px}.feature-heading{display:block}.feature-heading .count-badge{margin-top:16px}.search{font-size:17px;padding:17px}}
</style><style>.hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:20px}.language-switch{display:flex;gap:4px;padding:4px;border:1px solid var(--line);border-radius:10px;background:#141516}.language-switch button{border:0;border-radius:7px;background:transparent;color:var(--muted);padding:6px 9px;font:700 12px inherit;cursor:pointer}.language-switch button[aria-pressed="true"]{background:var(--blue-bg);color:#dceaff}.graphql-input{display:grid;gap:7px}.graphql-input>span{color:var(--muted);font:750 12px ui-monospace,SFMono-Regular,Menlo}.graphql-input pre{max-width:560px;margin:0;padding:13px 15px;overflow:auto;border:1px solid #29486f;border-radius:10px;background:#101924;white-space:pre}.graphql-input pre code{color:#dceaff;font-size:13px;line-height:1.55}</style></head><body><header class="hero"><div class="page-width"><div class="hero-top"><p class="eyebrow">NETWORKINGKIT</p><div class="language-switch" aria-label="Language selector"><button type="button" data-language-switch="en" aria-pressed="true">EN</button><button type="button" data-language-switch="zh" aria-pressed="false">中文</button></div></div><h1 data-en="Backend API Documentation" data-zh="后端 API 文档">Backend API Documentation</h1><p class="lede" data-en="Generated from App source · 1 backend server, 2 endpoints" data-zh="由 App 源码自动生成 · 共 1 个后端服务器，2 个端点">Generated from App source · 1 backend server, 2 endpoints</p></div></header><main class="page-width"><input class="search" type="search" placeholder="Search servers, URLs, or endpoints…" aria-label="Search servers" data-en-placeholder="Search servers, URLs, or endpoints…" data-zh-placeholder="筛选服务器、URL 或端点…" data-en-aria-label="Search servers" data-zh-aria-label="筛选服务器" data-filter><div class="chip-row"><span class="chip" data-en="1 server" data-zh="1 个服务器">1 server</span><span class="chip" data-en="2 endpoints" data-zh="2 个端点">2 endpoints</span></div><section class="card-grid" data-filter-container><a class="server-card" data-search="AppNetworkClient https://rickandmortyapi.com" href="AppNetworkClient.html"><span class="card-kicker" data-en="BACKEND SERVER" data-zh="后端服务器">BACKEND SERVER</span><h2>AppNetworkClient</h2><code>https://rickandmortyapi.com</code><span class="count-badge" data-en="2 endpoints" data-zh="2 个端点">2 endpoints</span></a></section><p class="empty" hidden data-en="No matching servers." data-zh="没有匹配的服务器。">No matching servers.</p></main><script>
const input=document.querySelector('[data-filter]');
if(input){const items=[...document.querySelectorAll('[data-search]')],empty=document.querySelector('.empty[hidden]');input.addEventListener('input',()=>{const q=input.value.trim().toLowerCase();let visible=0;items.forEach(item=>{const show=!q||item.dataset.search.toLowerCase().includes(q);item.hidden=!show;if(show)visible++});if(empty)empty.hidden=visible>0})}
const languageButtons=[...document.querySelectorAll('[data-language-switch]')];
const setLanguage=language=>{const active=language==='zh'?'zh':'en';document.documentElement.lang=active==='zh'?'zh-Hans':'en';document.querySelectorAll('[data-en][data-zh]').forEach(node=>node.textContent=node.dataset[active]);document.querySelectorAll('[data-en-placeholder][data-zh-placeholder]').forEach(node=>{node.placeholder=node.dataset[active+'Placeholder'];node.setAttribute('aria-label',node.dataset[active+'AriaLabel'])});languageButtons.forEach(button=>button.setAttribute('aria-pressed',String(button.dataset.languageSwitch===active)));try{localStorage.setItem('backend-reference-language',active)}catch(_){}};
languageButtons.forEach(button=>button.addEventListener('click',()=>setLanguage(button.dataset.languageSwitch)));
let initialLanguage='en';try{initialLanguage=localStorage.getItem('backend-reference-language')||'en'}catch(_){ }setLanguage(initialLanguage);
</script></body></html>
